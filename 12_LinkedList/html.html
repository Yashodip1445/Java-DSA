<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>HW Table</title>
  <style>
    body { margin: 20px; font-family: Arial, sans-serif; }
    table { border-collapse: collapse; width: 100%; }
    td { border: 1px solid #000; padding: 10px; min-height: 40px; }
    .outer-table { width: 100%; }
    .inner-table { width: 100%; border-collapse: collapse; }
    .inner-table td { border: 1px solid #cdc2c2; padding: 8px; }
    .nested-table { width: 100%; border-collapse: collapse; }
    .nested-table td { border: 1px solid #000; padding: 6px; }
    .bold-border { border: 2px solid #000; }
  </style>
</head>
<body>

<table class="outer-table">

  <!-- Row 1: 5 columns -->
  <tr>
    <td>&nbsp;</td>
    <td>&nbsp;</td>
    <td>&nbsp;</td>
    <td>&nbsp;</td>
    <td>&nbsp;</td>
  </tr>

  <!-- Row 2: full width single cell -->
  <tr>
    <td colspan="5">&nbsp;</td>
  </tr>

  <!-- Row 3: 2 columns (wide + narrow) -->
  <tr>
    <td colspan="4">&nbsp;</td>
    <td>&nbsp;</td>
  </tr>

  <!-- Row 4: 2 columns, second has 2 sub-rows -->
  <tr>
    <td colspan="2" rowspan="2">&nbsp;</td>
    <td colspan="3">&nbsp;</td>
  </tr>
  <tr>
    <td colspan="3">&nbsp;</td>
  </tr>

  <!-- Row 5: Contains nested table with bold border in middle -->
  <tr>
    <td>&nbsp;</td>
    <td colspan="3" class="bold-border" style="padding:0;">
      <table class="inner-table" style="border:none;">
        <tr>
          <td style="border:none; border-bottom:1px solid #000;">&nbsp;</td>
        </tr>
        <tr>
          <td style="border:none; border-bottom:1px solid #000;">&nbsp;</td>
        </tr>
        <tr>
          <td style="border:none;">&nbsp;</td>
        </tr>
      </table>
    </td>
    <td>&nbsp;</td>
  </tr>

  <!-- Row 6: full width single cell -->
  <tr>
    <td colspan="5">&nbsp;</td>
  </tr>

  <!-- Row 7: full width single cell -->
  <tr>
    <td colspan="5">&nbsp;</td>
  </tr>

  <!-- Row 8: 4 columns, third has nested table -->
  <tr>
    <td>&nbsp;</td>
    <td>&nbsp;</td>
    <td style="padding:0;">
      <table class="nested-table">
        <tr><td>&nbsp;</td></tr>
        <tr><td>&nbsp;</td></tr>
        <tr><td>&nbsp;</td></tr>
      </table>
    </td>
    <td>&nbsp;</td>
    <td>&nbsp;</td>
  </tr>

  <!-- Row 9: full width footer -->
  <tr>
    <td colspan="5">&nbsp;</td>
  </tr>

</table>

</body>
</html>
